# Pi 5 on sway (Wayland) — video output config.
#
# vo=gpu with gpu-api=opengl + gpu-context=wayland:
#   Pi 5's v3dv Vulkan driver has a swapchain recreation bug that makes
#   vo=gpu-next unusable with fullscreen (VK_ERROR_OUT_OF_HOST_MEMORY).
#   This mpv build also isn't compiled with v4l2-request, so the hardware
#   H.264 decoder can't feed dmabuf-wayland directly — software decode +
#   OpenGL render is the realistic path.
#
# profile=fast disables expensive shader effects so 1080p+ playback is
# smooth on the V3D at 30fps.
vo=gpu
gpu-api=opengl
gpu-context=wayland
profile=fast
