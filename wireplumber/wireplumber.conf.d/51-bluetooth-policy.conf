# WirePlumber policy: auto-route audio to Bluetooth devices on connect.
#
# A BT sink gets priority.session = 2000 (above the ~1000 used by
# ALSA/USB sinks). WirePlumber's default-node rescan hook picks the
# highest-priority session as the default, so a newly-connected BT
# device takes over playback automatically. Existing streams follow
# because linking.follow-default-target defaults to true.
#
# Also enables SBC-XQ (higher-quality SBC variant) and mSBC (wideband
# voice for HFP) when the device supports them.
#
# NOTE: bluez5.roles / bluez5.auto-connect are left at defaults — an
# explicit override of these was observed to suppress A2DP profile
# enumeration in testing.
#
# To apply after editing:
#     systemctl --user restart wireplumber

monitor.bluez.properties = {
  bluez5.enable-sbc-xq    = true
  bluez5.enable-msbc      = true
  bluez5.enable-hw-volume = true
}

monitor.bluez.rules = [
  {
    matches = [
      { node.name = "~bluez_output.*" }
    ]
    actions = {
      update-props = {
        priority.session = 2000
        priority.driver  = 2000
      }
    }
  }
]
